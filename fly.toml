app = "budget-platform-iba"
primary_region = "bom"

[build]

[env]
  DATABASE_URL = "sqlite:////data/budget_platform.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "budget_data"
  destination = "/data"
